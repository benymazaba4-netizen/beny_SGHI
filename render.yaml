# Blueprint Render — SGHI ERP Médical (API + PostgreSQL)
# Dashboard : https://dashboard.render.com → New → Blueprint → ce dépôt

databases:
  - name: sghi-db
    plan: free
    databaseName: sghi_db
    user: sghi

services:
  - type: web
    name: sghi-api
    runtime: python
    plan: free
    region: frankfurt
    branch: master
    # Commandes inline (évite les problèmes CRLF des .sh sous Windows)
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate --noinput && python manage.py seed_demo_users; gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    healthCheckPath: /api/v1/docs
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sghi-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://sghi-patient.onrender.com"
      # False : Render gère déjà le HTTPS (évite l’échec du health check)
      - key: SECURE_SSL_REDIRECT
        value: "False"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: DJANGO_ADMIN_ENABLED
        value: "False"
      - key: SEED_DEMO
        value: "True"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: EMAIL_OTP_ENABLED
        value: "True"
      - key: OTP_DEV_BYPASS_CODE
        value: "123456"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: DB_SSL_REQUIRE
        value: "True"

  # Portail patient Flutter Web (fichiers pré-buildés dans mobile-patient/build/web)
  - type: web
    name: sghi-patient
    runtime: static
    plan: free
    branch: master
    rootDir: mobile-patient
    buildCommand: echo "Flutter web prebuilt"
    staticPublishPath: build/web
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
