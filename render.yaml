# Blueprint Render — SGHI ERP Médical (API + PostgreSQL)
# Dashboard : https://dashboard.render.com → New → Blueprint → ce dépôt
#
# Flutter Web : déployer ensuite en Static Site (voir docs/DEPLOY_RENDER.md)
#   flutter build web --release --dart-define=API_BASE_URL=https://sghi-api.onrender.com/api/v1

databases:
  - name: sghi-db
    plan: free
    databaseName: sghi_db
    user: sghi

services:
  - type: web
    name: sghi-api
    runtime: python
    plan: free
    region: frankfurt
    branch: master
    buildCommand: chmod +x build.sh start.sh && ./build.sh
    startCommand: ./start.sh
    healthCheckPath: /api/v1/docs
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: FIELD_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: sghi-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        # Mettre l’URL exacte du Static Site Flutter après création
        value: "https://sghi-patient.onrender.com"
      - key: SECURE_SSL_REDIRECT
        value: "True"
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_HSTS_SECONDS
        value: "31536000"
      - key: DJANGO_ADMIN_ENABLED
        value: "False"
      - key: SEED_DEMO
        value: "True"
      - key: EMAIL_BACKEND
        value: "django.core.mail.backends.console.EmailBackend"
      - key: EMAIL_OTP_ENABLED
        value: "True"
      - key: OTP_DEV_BYPASS_CODE
        value: "123456"
      - key: WEB_CONCURRENCY
        value: "2"
